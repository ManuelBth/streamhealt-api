ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.betha.HttpKt.configureHttp
      - com.betha.SerializationKt.configureSerialization
      - com.betha.SecurityKt.configureSecurity
      - com.betha.RoutingKt.configureRouting
      - com.betha.mainKt.configureKoin

# JWT Configuration
jwt:
  secret: "streamhealth-secret-key-change-in-production-minimum-256-bits"
  expiration: 86400000  # 24 hours in milliseconds

# MongoDB Configuration
mongodb:
  uri: "mongodb://localhost:27017"

# Application Configuration
app:
  host: "0.0.0.0"
  port: 8080
